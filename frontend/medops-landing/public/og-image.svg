<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050608"/>
      <stop offset="100%" style="stop-color:#0c0e12"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#16a185129;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#16a185129;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  
  <!-- Logo -->
  <g transform="translate(540, 200)">
    <img src="/medopz_logo_blanco_solo.svg" width="120" height="120" x="-60" y="-60"/>
  </g>
  
  <!-- Brand Name -->
  <text x="600" y="350" font-family="Inter, system-ui" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle">MEDOPZ</text>
  
  <!-- Tagline -->
  <text x="600" y="420" font-family="Inter, system-ui" font-size="28" font-weight="400" fill="#e1e8ed" fill-opacity="0.7" text-anchor="middle">Infraestructura médica. Venezuela.</text>
  
  <!-- Subtitle -->
  <text x="600" y="480" font-family="Inter, system-ui" font-size="20" font-weight="300" fill="#e1e8ed" fill-opacity="0.5" text-anchor="middle">Plataforma de gestión médica profesional</text>
  
  <!-- Accent Line -->
  <rect x="500" y="510" width="200" height="2" rx="1" fill="#10b981" fill-opacity="0.6"/>
</svg>