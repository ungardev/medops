# docker-compose.snomed.yml
# SNOMED CT Microservice Stack for MEDOPZ
# Usage: docker-compose -f docker-compose.snomed.yml up -d
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
    container_name: medops_snomed_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - snomed_es_data:/usr/share/elasticsearch/data
    networks:
      - medops_net
  snowstorm:
    image: snomedinternational/snowstorm:latest
    container_name: medops_snowstorm
    ports:
      - "8080:8080"
    environment:
      - elasticsearch.urls=http://elasticsearch:9200
      - snowstorm.rest-api.readonly=false
    depends_on:
      - elasticsearch
    volumes:
      - snomed_data:/data
    networks:
      - medops_net
volumes:
  snomed_es_data:
  snomed_data:
networks:
  medops_net:
    external: true