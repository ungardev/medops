components:
  schemas:
    AuthToken:
      type: object
      properties:
        token:
          type: string
          readOnly: true
      required:
      - token
    AuthTokenRequest:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
          minLength: 1
          title: Nombre de usuario
        password:
          type: string
          writeOnly: true
          minLength: 1
          title: Contraseña
      required:
      - password
      - username
    BlankEnum:
      enum:
      - ''
    BloodTypeEnum:
      enum:
      - A+
      - A-
      - B+
      - B-
      - AB+
      - AB-
      - O+
      - O-
      type: string
      description: |-
        * `A+` - A+
        * `A-` - A-
        * `B+` - B+
        * `B-` - B-
        * `AB+` - AB+
        * `AB-` - AB-
        * `O+` - O+
        * `O-` - O-
    Country:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
      required:
      - id
      - name
    CountryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
      required:
      - name
    GenderEnum:
      enum:
      - M
      - F
      - Other
      - Unknown
      type: string
      description: |-
        * `M` - Masculino
        * `F` - Femenino
        * `Other` - Otro
        * `Unknown` - No especificado
    Municipality:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        state:
          allOf:
          - $ref: '#/components/schemas/State'
          readOnly: true
      required:
      - id
      - name
      - state
    MunicipalityRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        state_id:
          type: integer
          writeOnly: true
      required:
      - name
      - state_id
    Neighborhood:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        parish:
          allOf:
