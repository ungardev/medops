        required: false
        in: query
        description: Un número de página dentro del conjunto de resultados paginado.
        schema:
          type: integer
      - in: query
        name: presentation
        schema:
          type: string
          enum:
          - capsule
          - cream
          - drop
          - gel
          - granules
          - inhaler
          - injection
          - mouthwash
          - ointment
          - other
          - patch
          - powder
          - solution
          - spray
          - suppository
          - suspension
          - syrup
          - tablet
          - tablet_coated
        description: |-
          Forma farmacéutica (tableta, jarabe, cápsula, etc.)

          * `tablet` - Tableta
          * `capsule` - Cápsula
          * `syrup` - Jarabe
          * `drop` - Gotas
          * `injection` - Inyectable
          * `cream` - Crema
          * `gel` - Gel
          * `patch` - Parche
          * `spray` - Spray
          * `other` - Otro
          * `tablet_coated` - Tableta Recubierta
          * `suspension` - Suspensión
          * `solution` - Solución
          * `ointment` - Ungüento
          * `inhaler` - Inhalador
          * `suppository` - Supositorio
          * `powder` - Polvo
          * `granules` - Gránulos
          * `mouthwash` - Enjuague
      - in: query
        name: route
        schema:
          type: string
          enum:
          - inhalation
          - intramuscular
          - intravenous
          - nasal
          - ophthalmic
          - oral
          - other
          - otic
          - rectal
          - subcutaneous
          - sublingual
          - topical
        description: |-
          Vía de administración

          * `oral` - Oral
          * `intravenous` - Intravenosa (IV)
          * `intramuscular` - Intramuscular (IM)
          * `subcutaneous` - Subcutánea (SC)
          * `topical` - Tópica
          * `sublingual` - Sublingual
          * `inhalation` - Inhalación
          * `rectal` - Rectal
          * `ophthalmic` - Oftálmica
          * `otic` - Ótica
          * `nasal` - Nasal
          * `other` - Otro
      - name: search
        required: false
        in: query
        description: Un término de búsqueda.
        schema:
          type: string
      - in: query
        name: source
        schema:
          type: string
