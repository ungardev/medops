components:
  schemas:
    AccountTypeEnum:
      enum:
      - natural
      - juridica
      type: string
      description: |-
        * `natural` - Persona Natural
        * `juridica` - Persona Jurídica
    ActiveGatewayEnum:
      enum:
      - none
      - mercantil_ve
      - banesco_ve
      - stripe
      - binance_pay
      - paypal
      type: string
      description: |-
        * `none` - Manual / Registro Interno
        * `mercantil_ve` - Mercantil API (VE)
        * `banesco_ve` - Banesco Hub (VE)
        * `stripe` - Stripe Global
        * `binance_pay` - Binance Pay
        * `paypal` - PayPal Business
    AdmissionTypeEnum:
      enum:
      - emergency
      - scheduled
      - transfer
      - observation
      type: string
      description: |-
        * `emergency` - Emergencia
        * `scheduled` - Programada
        * `transfer` - Transferencia
        * `observation` - Observación
    AlcoholFrequencyEnum:
      enum:
      - never
      - monthly_or_less
      - 2_4_month
      - 2_3_week
      - 4_plus_week
      type: string
      description: |-
        * `never` - Nunca
        * `monthly_or_less` - Mensual o menos
        * `2_4_month` - 2-4 veces al mes
        * `2_3_week` - 2-3 veces por semana
        * `4_plus_week` - 4+ veces por semana
    AlcoholQuantityEnum:
      enum:
      - '1_2'
      - '3_4'
      - '5_6'
      - '7_9'
      - 10_plus
      type: string
      description: |-
        * `1_2` - 1-2
        * `3_4` - 3-4
        * `5_6` - 5-6
        * `7_9` - 7-9
        * `10_plus` - 10+
    Allergy:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        severity:
          type: string
          nullable: true
          description: 'Gravedad de la alergia: leve, moderada, grave'
          maxLength: 50
        source:
          type: string
          nullable: true
          description: 'Fuente: historia clínica, verbal, prueba'
          maxLength: 100
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - updated_at
    AllergyRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        severity:
          type: string
          nullable: true
          description: 'Gravedad de la alergia: leve, moderada, grave'
          maxLength: 50
        source:
          type: string
          nullable: true
          description: 'Fuente: historia clínica, verbal, prueba'
          maxLength: 100
        notes:
          type: string
          nullable: true
      required:
      - name
    AnesthesiaTypeEnum:
      enum:
      - general
      - regional
      - local
      - sedation
      - combined
      type: string
      description: |-
        * `general` - General
        * `regional` - Regional
        * `local` - Local
        * `sedation` - Sedación Consciente
        * `combined` - Combinada
    Appointment:
      type: object
      description: |-
        Serializer de LISTADO y ESCRITURA: Optimizado para el calendario y la
        gestión administrativa de citas.
      properties:
        id:
          type: integer
          readOnly: true
        institution:
          type: integer
          title: Sede de atención
        doctor:
          type: integer
          title: Médico tratante
        doctor_name:
          type: string
          readOnly: true
        patient:
          type: integer
        patient_name:
          type: string
          readOnly: true
        appointment_date:
          type: string
          format: date
        appointment_type:
          allOf:
          - $ref: '#/components/schemas/AppointmentTypeEnum'
          title: Tipo de consulta
        appointment_type_display:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/AppointmentStatusEnum'
        status_display:
          type: string
          readOnly: true
        expected_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          title: Monto esperado (Sede)
        arrival_time:
          type: string
          format: time
          nullable: true
        doctor_service:
          type: integer
          nullable: true
          title: Servicio específico agendado
        doctor_service_name:
          type: string
          readOnly: true
        weight:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
          description: Peso del paciente en kg
        height:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
          description: Altura del paciente en cm
        vital_signs:
          allOf:
          - $ref: '#/components/schemas/VitalSigns'
          readOnly: true
        charge_order:
          allOf:
          - $ref: '#/components/schemas/ChargeOrder'
          readOnly: true
        tentative_date:
          type: string
          format: date
          readOnly: true
        tentative_time:
          type: string
          format: time
          readOnly: true
        confirmed_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - appointment_date
      - appointment_type_display
      - charge_order
      - confirmed_at
      - doctor
      - doctor_name
      - doctor_service_name
      - id
      - institution
      - patient
      - patient_name
      - status_display
      - tentative_date
      - tentative_time
      - vital_signs
    AppointmentRequest:
      type: object
      description: |-
        Serializer de LISTADO y ESCRITURA: Optimizado para el calendario y la
        gestión administrativa de citas.
      properties:
        institution:
          type: integer
          title: Sede de atención
        doctor:
          type: integer
          title: Médico tratante
        patient:
          type: integer
        appointment_date:
          type: string
          format: date
        appointment_type:
          allOf:
          - $ref: '#/components/schemas/AppointmentTypeEnum'
          title: Tipo de consulta
        status:
          $ref: '#/components/schemas/AppointmentStatusEnum'
        expected_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          title: Monto esperado (Sede)
        arrival_time:
          type: string
          format: time
          nullable: true
        doctor_service:
          type: integer
          nullable: true
          title: Servicio específico agendado
        services:
          type: array
          items:
            type: object
            additionalProperties:
              type: string
              minLength: 1
          writeOnly: true
          description: 'Lista de servicios: [{''doctor_service_id'': 1, ''qty'': 1}]'
        initial_payment:
          type: object
          additionalProperties: {}
          writeOnly: true
        weight:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
          description: Peso del paciente en kg
        height:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
          description: Altura del paciente en cm
      required:
      - appointment_date
      - doctor
      - institution
      - patient
      - services
    AppointmentStatusEnum:
      enum:
      - pending
      - tentative
      - arrived
      - in_consultation
      - completed
      - canceled
      - rejected
      type: string
      description: |-
        * `pending` - Pending
        * `tentative` - Tentativa
        * `arrived` - Arrived
        * `in_consultation` - In Consultation
        * `completed` - Completed
        * `canceled` - Canceled
        * `rejected` - Rechazada
    AppointmentTypeEnum:
      enum:
      - general
      - specialized
