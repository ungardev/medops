openapi: 3.0.3
info:
  title: MEDOPZ API
  version: 1.0.0
  description: Documentación de la API de MEDOPZ
paths:
  /api/address-chain/:
    get:
      operationId: address_chain_retrieve
      tags:
      - address-chain
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/api/medical-services/:
    get:
      operationId: api_medical_services_retrieve
      description: |-
        Endpoint para obtener lista de servicios médicos.
        Público (no requiere institución activa) para uso del Portal Paciente.
      tags:
      - api
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/appointments/{appointment_id}/charge-order/:
    get:
      operationId: appointments_charge_order_retrieve
      description: |-
        Obtener charge order ACTIVO asociado a una cita.
        Excluye órdenes void/waived.
        GET /api/appointments/<appointment_id>/charge-order/
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/{appointment_id}/charge-order/add-items/:
    post:
      operationId: appointments_charge_order_add_items_create
      description: |-
        Agregar items a orden de cobro. Crea la orden automáticamente si no existe una activa.
        POST /api/appointments/{appointment_id}/charge-order/add-items/
        Body: { "items": [{ "service_id": 1, "qty": 1 }] }
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/{appointment_id}/charge-order/create/:
    post:
      operationId: appointments_charge_order_create_create
      description: |-
        Crear charge order para una cita.
        NOTA: Este endpoint está deprecado. Usar add_charge_order_items en su lugar.
        POST /api/appointments/<appointment_id>/charge-order/create/
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/{appointment_id}/clinical-note/:
    get:
      operationId: appointments_clinical_note_retrieve
      description: |-
        API para notas clínicas SOAP.

        GET /api/appointments/<appointment_id>/clinical-note/
            - Retorna 200 con la nota si existe
            - Retorna 200 con null si no existe

        POST /api/appointments/<appointment_id>/clinical-note/
            - Crea nueva nota clínica

        PATCH /api/appointments/<appointment_id>/clinical-note/
            - Actualiza nota existente
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: appointments_clinical_note_create
      description: |-
        API para notas clínicas SOAP.

        GET /api/appointments/<appointment_id>/clinical-note/
            - Retorna 200 con la nota si existe
            - Retorna 200 con null si no existe

        POST /api/appointments/<appointment_id>/clinical-note/
            - Crea nueva nota clínica

        PATCH /api/appointments/<appointment_id>/clinical-note/
            - Actualiza nota existente
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: appointments_clinical_note_partial_update
      description: |-
        API para notas clínicas SOAP.

        GET /api/appointments/<appointment_id>/clinical-note/
            - Retorna 200 con la nota si existe
            - Retorna 200 con null si no existe

        POST /api/appointments/<appointment_id>/clinical-note/
            - Crea nueva nota clínica

        PATCH /api/appointments/<appointment_id>/clinical-note/
            - Actualiza nota existente
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/{appointment_id}/clinical-note/lock/:
    post:
      operationId: appointments_clinical_note_lock_create
      description: |-
        Bloquear/Desbloquear nota clínica.

        POST /api/appointments/<appointment_id>/clinical-note/lock/ → Bloquear
        POST /api/appointments/<appointment_id>/clinical-note/unlock/ → Desbloquear
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/{appointment_id}/vital-signs/:
    get:
      operationId: appointments_vital_signs_retrieve
      description: Obtener o crear signos vitales para una cita.
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: appointments_vital_signs_create
      description: Obtener o crear signos vitales para una cita.
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/{id}/:
    get:
      operationId: appointments_retrieve
      description: |-
        Obtiene el detalle completo de una cita con datos financieros.
        Usa AppointmentDetailSerializer para incluir charge_order con payments.

        ✅ ACTUALIZADO: Ahora acepta GET, PUT, PATCH, DELETE
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
    put:
      operationId: appointments_update
      description: |-
        Obtiene el detalle completo de una cita con datos financieros.
        Usa AppointmentDetailSerializer para incluir charge_order con payments.

        ✅ ACTUALIZADO: Ahora acepta GET, PUT, PATCH, DELETE
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
    patch:
      operationId: appointments_partial_update
      description: |-
        Obtiene el detalle completo de una cita con datos financieros.
        Usa AppointmentDetailSerializer para incluir charge_order con payments.

        ✅ ACTUALIZADO: Ahora acepta GET, PUT, PATCH, DELETE
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
    delete:
      operationId: appointments_destroy
      description: |-
        Obtiene el detalle completo de una cita con datos financieros.
        Usa AppointmentDetailSerializer para incluir charge_order con payments.

        ✅ ACTUALIZADO: Ahora acepta GET, PUT, PATCH, DELETE
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/appointments/{id}/confirm/:
    post:
      operationId: appointments_confirm_create
      description: |-
        Endpoint para confirmar una cita tentativa desde el Portal Doctor.
        Opera sobre una Appointment existente y actualiza su estado a 'pending'.
        La ChargeOrder se gestiona automáticamente via recalc_totals() al registrar pagos.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/{id}/notes/:
    post:
      operationId: appointments_notes_create
      description: |-
        Actualiza las notas de una cita médica.
        Requiere: appointment_id (pk), notes (string)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/{id}/status/:
    post:
      operationId: appointments_status_create
      description: |-
        Actualiza el status de un appointment.
        Acepta POST y PATCH para mayor flexibilidad del frontend.

        Cuando el status es 'completed', automáticamente sincroniza
        el WaitingRoomEntry relacionado para mantener consistencia.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: appointments_status_partial_update
      description: |-
        Actualiza el status de un appointment.
        Acepta POST y PATCH para mayor flexibilidad del frontend.

        Cuando el status es 'completed', automáticamente sincroniza
        el WaitingRoomEntry relacionado para mantener consistencia.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/pending/:
    get:
      operationId: appointments_pending_retrieve
      description: |-
        Obtiene TODAS las citas pendientes/programadas de la institución.
        Incluye resumen financiero completo por cita.
        Orden: más recientes primero (descendente por fecha).
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/search/:
    get:
      operationId: appointments_search_retrieve
      description: |-
        Busca citas por paciente, ID, o campos relacionados.
        Soporta búsqueda por nombre, cédula, ID de cita, o fecha.
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/appointments/today/:
    get:
      operationId: appointments_today_retrieve
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/audit/aggregates/:
    get:
      operationId: audit_aggregates_retrieve
      description: |-
        Devuelve métricas de auditoría para el dashboard.
        Total de eventos, agrupados por entidad y acción.
      tags:
      - audit
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/audit/appointment/{appointment_id}/:
    get:
      operationId: audit_appointment_retrieve
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - audit
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/audit/log/:
    get:
      operationId: audit_log_retrieve
      tags:
      - audit
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/audit/patient/{patient_id}/:
    get:
      operationId: audit_patient_retrieve
      parameters:
      - in: path
        name: patient_id
        schema:
          type: integer
        required: true
      tags:
      - audit
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/doctor-login/:
    post:
      operationId: auth_doctor_login_create
      description: |-
        POST /api/auth/doctor-login/
        Login exclusivo para doctores - rechaza pacientes.
      tags:
      - auth
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/login/:
    post:
      operationId: auth_login_create
      tags:
      - auth
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthTokenRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AuthTokenRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/AuthTokenRequest'
        required: true
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/verify/:
    get:
      operationId: auth_verify_retrieve
      description: |-
        Verifica si el token de autenticación es válido.
        Retorna datos básicos del usuario autenticado.
      tags:
      - auth
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/bcv-rate/:
    get:
      operationId: bcv_rate_retrieve
      description: Obtener tasa BCV actual
      tags:
      - bcv-rate
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/charge-orders/{id}/export/:
    get:
      operationId: charge_orders_export_retrieve
      description: Genera PDF de orden de cobro con código de auditoría QR.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - charge-orders
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: charge_orders_export_create
      description: Genera PDF de orden de cobro con código de auditoría QR.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - charge-orders
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/charge-orders/create-from-service/:
    post:
      operationId: charge_orders_create_from_service_create
      description: |-
        POST /api/charge-orders/create-from-service/
        Crea solo un ChargeOrder sin crear Appointment.
        El Appointment se crea cuando el doctor confirma el pago.
      tags:
      - charge-orders
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/charge-orders/search/:
    get:
      operationId: charge_orders_search_retrieve
      description: |-
        Busca órdenes de cobro por paciente, ID, o campos relacionados.
        Soporta búsqueda por nombre, cédula, ID de orden, ID de cita, o monto.
      tags:
      - charge-orders
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/chargeorders/{id}/generate-pdf/:
    get:
      operationId: chargeorders_generate_pdf_retrieve
      description: Genera PDF de orden de cobro con código de auditoría QR.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - chargeorders
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: chargeorders_generate_pdf_create
      description: Genera PDF de orden de cobro con código de auditoría QR.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - chargeorders
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/charges/purchase-service/:
    post:
      operationId: charges_purchase_service_create
      description: |-
        Endpoint para comprar un servicio directamente desde el Portal Paciente.
        Crea Appointment + ChargeOrder + ChargeItems en un solo paso usando
        el flujo estándar del AppointmentSerializer.
      tags:
      - charges
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/choices/medical-referral/:
    get:
      operationId: choices_medical_referral_retrieve
      description: |-
        Devuelve las especialidades médicas disponibles para referencias.
        Usado para autocompletar en el formulario de referencias.
      tags:
      - choices
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
