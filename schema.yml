      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: appointments_clinical_note_create
      description: |-
        API para notas clínicas SOAP.

        GET /api/appointments/<appointment_id>/clinical-note/
            - Retorna 200 con la nota si existe
            - Retorna 200 con null si no existe

        POST /api/appointments/<appointment_id>/clinical-note/
            - Crea nueva nota clínica

        PATCH /api/appointments/<appointment_id>/clinical-note/
            - Actualiza nota existente
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: appointments_clinical_note_partial_update
      description: |-
        API para notas clínicas SOAP.

        GET /api/appointments/<appointment_id>/clinical-note/
            - Retorna 200 con la nota si existe
            - Retorna 200 con null si no existe

        POST /api/appointments/<appointment_id>/clinical-note/
            - Crea nueva nota clínica

        PATCH /api/appointments/<appointment_id>/clinical-note/
            - Actualiza nota existente
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
