  /api/config/doctor/:
    get:
      operationId: config_doctor_retrieve
      description: Endpoint de configuración del doctor operador.
      tags:
      - config
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: config_doctor_partial_update
      description: Endpoint de configuración del doctor operador.
      tags:
      - config
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/config/institution/:
    get:
      operationId: config_institution_retrieve
      description: |-
        Endpoint de configuración de institución.

        GET:
            Si no hay autenticación: Devuelve institución global (legacy singleton)
            Si hay autenticación: Devuelve todas las instituciones del doctor
            Si query param 'active_only=true': Devuelve solo la institución activa

        PATCH:
            Actualiza la institución ACTIVA del doctor (según header X-Institution-ID)
      tags:
      - config
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: config_institution_partial_update
      description: |-
        Endpoint de configuración de institución.

        GET:
            Si no hay autenticación: Devuelve institución global (legacy singleton)
            Si hay autenticación: Devuelve todas las instituciones del doctor
            Si query param 'active_only=true': Devuelve solo la institución activa

        PATCH:
            Actualiza la institución ACTIVA del doctor (según header X-Institution-ID)
      tags:
      - config
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/config/institution-permissions/:
    get:
      operationId: config_institution_permissions_retrieve
      description: Obtener permisos del médico actual
      tags:
      - config
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/config/institution-permissions/emergency-refresh/:
    post:
      operationId: config_institution_permissions_emergency_refresh_create
      description: Refrescar emergency access (24h adicionales)
      tags:
      - config
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/config/institutions/:
    get:
      operationId: config_institutions_retrieve
      description: Obtiene todas las instituciones del doctor autenticado.
      tags:
      - config
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
