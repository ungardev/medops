openapi: 3.0.3
info:
  title: MEDOPZ API
  version: 1.0.0
  description: Documentación de la API de MEDOPZ
paths:
  /api/address-chain/:
    get:
      operationId: address_chain_retrieve
      tags:
      - address-chain
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/api/medical-services/:
    get:
      operationId: api_medical_services_retrieve
      description: |-
        Endpoint para obtener lista de servicios médicos.
        Público (no requiere institución activa) para uso del Portal Paciente.
      tags:
      - api
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/appointments/:
    get:
      operationId: appointments_list
      description: |-
        Control Élite de Citas y Notas Clínicas.
        Maneja el ciclo de vida de la consulta y el bloqueo de integridad.
      parameters:
      - in: query
        name: appointment_date
        schema:
          type: string
          format: date
      - in: query
        name: doctor
        schema:
          type: integer
      - in: query
        name: institution
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Qué campo usar para ordenar los resultados.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un número de página dentro del conjunto de resultados paginado.
        schema:
          type: integer
      - in: query
        name: patient
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Un término de búsqueda.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - arrived
          - canceled
          - completed
          - in_consultation
          - pending
          - rejected
          - tentative
        description: |-
          * `pending` - Pending
          * `tentative` - Tentativa
          * `arrived` - Arrived
          * `in_consultation` - In Consultation
          * `completed` - Completed
          * `canceled` - Canceled
          * `rejected` - Rechazada
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppointmentList'
          description: ''
    post:
      operationId: appointments_create
      description: |-
        Control Élite de Citas y Notas Clínicas.
        Maneja el ciclo de vida de la consulta y el bloqueo de integridad.
      tags:
      - appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
        required: true
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
  /api/appointments/{appointment_id}/charge-order/:
    get:
      operationId: appointments_charge_order_retrieve
      description: |-
        Obtener charge order ACTIVO asociado a una cita.
        Excluye órdenes void/waived.
        GET /api/appointments/<appointment_id>/charge-order/
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/{appointment_id}/charge-order/add-items/:
    post:
      operationId: appointments_charge_order_add_items_create
      description: |-
        Agregar items a orden de cobro. Crea la orden automáticamente si no existe una activa.
        POST /api/appointments/{appointment_id}/charge-order/add-items/
        Body: { "items": [{ "service_id": 1, "qty": 1 }] }
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/{appointment_id}/charge-order/create/:
    post:
      operationId: appointments_charge_order_create_create
      description: |-
        Crear charge order para una cita.
        NOTA: Este endpoint está deprecado. Usar add_charge_order_items en su lugar.
        POST /api/appointments/<appointment_id>/charge-order/create/
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - tokenAuth: []
      - jwtAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/{appointment_id}/clinical-note/:
    get:
