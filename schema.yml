        * `II` - ASA II - Enfermedad sistémica leve
        * `III` - ASA III - Enfermedad sistémica severa
        * `IV` - ASA IV - Enfermedad que amenaza la vida
        * `V` - ASA V - Paciente moribundo
        * `VI` - ASA VI - Muerte cerebral declarada
